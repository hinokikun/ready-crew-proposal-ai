name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  APP_AUTH_SECRET: test-secret
  INITIAL_ADMIN_EMAIL: admin@example.com
  INITIAL_ADMIN_PASSWORD: test-password
  DATABASE_URL: sqlite:///test.db
  USE_MOCK_AI: "true"
  OPENAI_API_KEY: test-key
  CORS_ORIGINS: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:8000
  NEXT_PUBLIC_LOG_LEVEL: silent

jobs:
  backend-test:
    name: Backend pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m compileall app tests
          python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  frontend-e2e:
    name: Frontend Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: |
          cd frontend
          npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  lint-check:
    name: Lint and syntax checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Python syntax check
        run: |
          cd backend
          python -m compileall app tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript type check
        run: |
          cd frontend
          npm run typecheck

      - name: Import and unused code check
        run: |
          cd frontend
          npm run check:unused

  cloud-smoke:
    name: Cloud deployment smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run safe cloud smoke test
        env:
          FRONTEND_URL: ${{ secrets.SMOKE_FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.SMOKE_BACKEND_URL }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_VIEWER_EMAIL: ${{ secrets.SMOKE_VIEWER_EMAIL }}
          SMOKE_VIEWER_PASSWORD: ${{ secrets.SMOKE_VIEWER_PASSWORD }}
          SMOKE_DISABLED_EMAIL: ${{ secrets.SMOKE_DISABLED_EMAIL }}
          SMOKE_DISABLED_PASSWORD: ${{ secrets.SMOKE_DISABLED_PASSWORD }}
          SMOKE_EXPECT_PILOT_MODE: ${{ secrets.SMOKE_EXPECT_PILOT_MODE }}
        run: python scripts/smoke_test.py
